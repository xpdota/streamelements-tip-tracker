<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Top 10 Tippers</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <style>
        body {
            background-color: rgba(30, 30, 30, 0.9);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 40px;
        }
        h1 {
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 1.5em;
            padding-bottom: 10px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            padding: 12px 0;
            border: none;
            font-size: 1.1em;
        }
        .username {
            text-align: left;
            font-weight: 400;
        }
        .amount {
            text-align: right;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>Top 10 Tippers</h1>
    
    <div id="tips-container">
        <table>
            <tbody id="tips-table-body" hx-get="/tips/table" hx-trigger="every 60s" hx-swap="innerHTML">
                <!-- Initial render using the same fragment -->
                <th:block th:insert="~{fragments/tips-table}"></th:block>
            </tbody>
        </table>
    </div>
</body>
</html>
