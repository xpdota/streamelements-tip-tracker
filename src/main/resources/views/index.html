<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>StreamElements Tip Tracker</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Top Tippers</h1>
    
    <div id="tips-container">
        <button hx-get="/tips/table" hx-target="#tips-table-body" hx-swap="innerHTML">Refresh Tips</button>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Total Tips</th>
                </tr>
            </thead>
            <tbody id="tips-table-body">
                <tr th:each="tipper : ${tips}">
                    <td th:text="${tipper.username}">Username</td>
                    <td th:text="${#numbers.formatDecimal(tipper.amount, 1, 2)}">0.00</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
